<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Git Push Test</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="container">
    <h1>Creative Neumorphic Clock</h1>
    <div class="clock">
      <div class="unit" id="hours">00</div>
      <div class="separator">:</div>
      <div class="unit" id="minutes">00</div>
      <div class="separator">:</div>
      <div class="unit" id="seconds">00</div>
    </div>
    <p>A dynamic clock that subtly changes background color every second.</p>
  </main>
  <script src="script.js"></script>
</body>
</html>
